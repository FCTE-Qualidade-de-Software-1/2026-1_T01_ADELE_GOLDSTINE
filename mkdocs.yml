site_name: Adele Goldstine - 2026.1 T01
site_description: Avaliação da qualidade de software do SuaGradeUnB
site_url: https://FCTE-Qualidade-de-Software-1.github.io/2026-1_T01_ADELE_GOLDSTINE/
repo_url: https://github.com/FCTE-Qualidade-de-Software-1/2026-1_T01_ADELE_GOLDSTINE
repo_name: Adele Goldstine

nav:
  - Home: index.md
  - Fase 1:
      - Objeto de Estudo: fase1/objetoDeEstudo.md
      - Contexto da Avaliação: fase1/contexto-da-avaliacao.md
      - ODS: fase1/ods.md
      - Modelo de Qualidade: fase1/qualidades.md
      - Conclusão: fase1/conclusao.md

theme:
  name: material
  language: pt
  logo: assets/logo.png
  favicon: assets/favicon.png
  font:
    text: Poppins
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
  palette:
    - scheme: default
      primary: light green
      accent: blue
      toggle:
        icon: material/weather-night
        name: Modo escuro
    - scheme: slate
      primary: light green
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Modo claro

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
